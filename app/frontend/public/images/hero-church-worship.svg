<svg width="1024" height="576" viewBox="0 0 1024 576" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="churchGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warmLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="576" fill="url(#churchGradient)"/>
  
  <!-- Warm lighting effect -->
  <ellipse cx="512" cy="200" rx="400" ry="300" fill="url(#warmLight)" opacity="0.4"/>
  
  <!-- Church interior architecture -->
  <path d="M 300 576 L 300 300 L 512 150 L 724 300 L 724 576 Z" fill="#2d2d2d" opacity="0.3"/>
  
  <!-- Arched windows -->
  <circle cx="380" cy="250" r="60" fill="#e94560" opacity="0.6"/>
  <circle cx="644" cy="250" r="60" fill="#e94560" opacity="0.6"/>
  
  <!-- Spiritual light rays -->
  <line x1="512" y1="50" x2="512" y2="400" stroke="#d4a574" stroke-width="3" opacity="0.5"/>
  <line x1="450" y1="100" x2="512" y2="400" stroke="#d4a574" stroke-width="2" opacity="0.4"/>
  <line x1="574" y1="100" x2="512" y2="400" stroke="#d4a574" stroke-width="2" opacity="0.4"/>
  
  <!-- Cross symbol -->
  <line x1="512" y1="120" x2="512" y2="200" stroke="#ffffff" stroke-width="8" opacity="0.8"/>
  <line x1="460" y1="150" x2="564" y2="150" stroke="#ffffff" stroke-width="8" opacity="0.8"/>
  
  <!-- Text overlay -->
  <text x="512" y="480" font-family="Playfair Display, serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Grace Church
  </text>
  <text x="512" y="530" font-family="Inter, sans-serif" font-size="24" fill="#d4a574" text-anchor="middle" opacity="0.8">
    Worship Service
  </text>
</svg>